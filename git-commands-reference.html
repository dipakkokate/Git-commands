<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Git Commands Reference</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #13161d; --surface2: #1a1e28;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
    --accent: #f97316; --text: #e8eaf0; --muted: #7a7f8e; --hint: #454958;
    --code-bg: rgba(249,115,22,0.1); --code-color: #fb923c;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  header {
    border-bottom: 1px solid var(--border); padding: 2.5rem 2rem 2rem;
    background: linear-gradient(180deg, #111318 0%, var(--bg) 100%); position: relative; overflow: hidden;
  }
  header::before {
    content: ''; position: absolute; top: -60px; left: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%); pointer-events: none;
  }
  .header-inner { max-width: 900px; margin: 0 auto; position: relative; }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 8px; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; color: #fff;
  }
  .logo-text { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; }
  h1 span { color: var(--accent); }
  .subtitle { margin-top: 0.5rem; color: var(--muted); font-size: 15px; }
  .stats { display: flex; gap: 1.5rem; margin-top: 1.25rem; }
  .stat { font-size: 13px; color: var(--hint); }
  .stat strong { color: var(--text); font-weight: 600; }
  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 2rem 4rem; }
  .search-wrap { position: relative; margin-bottom: 1.25rem; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px 10px 38px;
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--hint); }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .filter-btn {
    padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-family: 'Syne', sans-serif; transition: all 0.15s; letter-spacing: 0.03em;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .count { font-size: 12px; color: var(--hint); margin-bottom: 0.75rem; }
  .cmd-list { display: flex; flex-direction: column; gap: 6px; }
  .cmd-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .cmd-card:hover { border-color: var(--border-hover); }
  .cmd-card.open { border-color: rgba(249,115,22,0.4); }
  .cmd-top { display: flex; align-items: center; gap: 10px; padding: 0.75rem 1rem; cursor: pointer; user-select: none; }
  .cmd-code {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
    color: var(--code-color); background: var(--code-bg); padding: 3px 10px; border-radius: 5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .cmd-summary { font-size: 13px; color: var(--muted); flex: 1; }
  .cmd-tag { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 10px; white-space: nowrap; letter-spacing: 0.04em; flex-shrink: 0; }
  .chevron { width: 16px; height: 16px; flex-shrink: 0; color: var(--hint); transition: transform 0.2s; }
  .cmd-card.open .chevron { transform: rotate(180deg); color: var(--accent); }
  .cmd-detail { display: none; padding: 0 1rem 1rem; border-top: 1px solid var(--border); }
  .cmd-card.open .cmd-detail { display: block; }
  .detail-section { margin-top: 0.75rem; }
  .detail-label { font-size: 11px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-weight: 600; }
  .use-case { font-size: 13px; color: var(--muted); line-height: 1.65; }
  .example-block {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--surface2); border-radius: 6px; padding: 10px 12px;
    color: var(--code-color); white-space: pre-wrap; border-left: 2px solid var(--accent); line-height: 1.7;
  }
  .no-results { text-align: center; color: var(--hint); padding: 3rem; font-size: 14px; }
  footer { text-align: center; color: var(--hint); font-size: 12px; padding: 2rem; border-top: 1px solid var(--border); max-width: 900px; margin: 0 auto; }
  @media (max-width: 600px) {
    main, header { padding-left: 1rem; padding-right: 1rem; }
    .cmd-summary { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">G</div>
      <span class="logo-text">Reference Sheet</span>
    </div>
    <h1>Git <span>Commands</span></h1>
    <p class="subtitle">Every essential command with use cases and examples</p>
    <div class="stats">
      <div class="stat"><strong>33</strong> commands</div>
      <div class="stat"><strong>10</strong> categories</div>
      <div class="stat"><strong>Click</strong> any card to expand</div>
    </div>
  </div>
</header>
<main>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search commands, categories..." oninput="render()" />
  </div>
  <div class="filter-bar" id="filters"></div>
  <div class="count" id="count"></div>
  <div class="cmd-list" id="list"></div>
</main>
<footer>Git Commands Reference &mdash; Save this file as <code>GIT_REFERENCE.html</code> in your repository root</footer>
<script>
const TAG_COLORS = {
  Setup:    { c: '#3b82f6', bg: 'rgba(59,130,246,0.12)' },
  Inspect:  { c: '#8b5cf6', bg: 'rgba(139,92,246,0.12)' },
  Stage:    { c: '#10b981', bg: 'rgba(16,185,129,0.12)' },
  Commit:   { c: '#f59e0b', bg: 'rgba(245,158,11,0.12)' },
  Branch:   { c: '#ec4899', bg: 'rgba(236,72,153,0.12)' },
  Merge:    { c: '#06b6d4', bg: 'rgba(6,182,212,0.12)' },
  Remote:   { c: '#84cc16', bg: 'rgba(132,204,22,0.12)' },
  Stash:    { c: '#f97316', bg: 'rgba(249,115,22,0.12)' },
  Tags:     { c: '#a78bfa', bg: 'rgba(167,139,250,0.12)' },
  Advanced: { c: '#e11d48', bg: 'rgba(225,29,72,0.12)' },
};
const COMMANDS = [
  { cmd:"git init", tag:"Setup", summary:"Initialize a new repository", usecase:"Start tracking a new project with Git.", example:"git init\ngit init my-project" },
  { cmd:"git clone", tag:"Setup", summary:"Clone a remote repository", usecase:"Download an existing repo from GitHub or any remote URL.", example:"git clone https://github.com/user/repo.git\ngit clone git@github.com:user/repo.git my-folder" },
  { cmd:"git config", tag:"Setup", summary:"Set user identity and preferences", usecase:"Configure your name, email, editor, and aliases globally or per-repo.", example:"git config --global user.name \"Your Name\"\ngit config --global user.email \"you@example.com\"\ngit config --global core.editor vim" },
  { cmd:"git status", tag:"Inspect", summary:"Show working tree status", usecase:"See which files are modified, staged, or untracked before committing.", example:"git status\ngit status -s" },
  { cmd:"git log", tag:"Inspect", summary:"Show commit history", usecase:"Browse past commits, authors, and messages.", example:"git log\ngit log --oneline --graph --all\ngit log -p -2" },
  { cmd:"git diff", tag:"Inspect", summary:"Show changes between commits or working tree", usecase:"Review exactly what changed in a file before staging or committing.", example:"git diff\ngit diff --staged\ngit diff HEAD~1 HEAD" },
  { cmd:"git show", tag:"Inspect", summary:"Show a specific commit or object", usecase:"Inspect the full details of any commit by its hash.", example:"git show abc1234\ngit show HEAD" },
  { cmd:"git blame", tag:"Inspect", summary:"Show who changed each line", usecase:"Find out who last modified each line of a file and when.", example:"git blame index.html\ngit blame -L 10,20 app.js" },
  { cmd:"git shortlog", tag:"Inspect", summary:"Summarize commits by author", usecase:"See contribution counts grouped by contributor.", example:"git shortlog -sn\ngit shortlog -sn --all" },
  { cmd:"git grep", tag:"Inspect", summary:"Search through tracked files", usecase:"Find a string across all files in the repository.", example:"git grep 'TODO'\ngit grep -n 'function login'" },
  { cmd:"git add", tag:"Stage", summary:"Stage changes for commit", usecase:"Select which changes to include in the next commit.", example:"git add file.txt\ngit add .\ngit add -p" },
  { cmd:"git restore", tag:"Stage", summary:"Discard changes in working tree", usecase:"Undo edits to a file before staging, or unstage a file.", example:"git restore file.txt\ngit restore --staged file.txt" },
  { cmd:"git commit", tag:"Commit", summary:"Record staged changes to history", usecase:"Save a snapshot of staged changes with a meaningful message.", example:"git commit -m \"fix: correct typo in readme\"\ngit commit --amend\ngit commit -am \"quick fix\"" },
  { cmd:"git revert", tag:"Commit", summary:"Undo a commit by creating a new one", usecase:"Safely undo a past commit without rewriting history — great for shared branches.", example:"git revert abc1234\ngit revert HEAD" },
  { cmd:"git reset", tag:"Commit", summary:"Move HEAD and optionally unstage or discard", usecase:"Undo commits locally. Use --soft to keep staged, --mixed to keep unstaged, --hard to discard all.", example:"git reset --soft HEAD~1\ngit reset --mixed HEAD~1\ngit reset --hard HEAD~2" },
  { cmd:"git branch", tag:"Branch", summary:"List, create, or delete branches", usecase:"Manage feature branches, see what exists, or clean up old ones.", example:"git branch\ngit branch feature/login\ngit branch -d old-branch\ngit branch -m old-name new-name" },
  { cmd:"git checkout", tag:"Branch", summary:"Switch branches or restore files", usecase:"Switch to another branch or create a new one and switch immediately.", example:"git checkout main\ngit checkout -b feature/new-ui\ngit checkout -- file.txt" },
  { cmd:"git switch", tag:"Branch", summary:"Switch branches (modern syntax)", usecase:"Cleaner replacement for git checkout when only switching branches.", example:"git switch main\ngit switch -c feature/auth" },
  { cmd:"git merge", tag:"Merge", summary:"Merge a branch into the current branch", usecase:"Combine completed feature branches back into main.", example:"git merge feature/login\ngit merge --no-ff feature/login\ngit merge --abort" },
  { cmd:"git rebase", tag:"Merge", summary:"Reapply commits on top of another branch", usecase:"Keep a linear history by replaying your branch commits on top of main.", example:"git rebase main\ngit rebase -i HEAD~3\ngit rebase --abort" },
  { cmd:"git cherry-pick", tag:"Merge", summary:"Apply a specific commit to current branch", usecase:"Pull in a single bug fix from another branch without merging the whole branch.", example:"git cherry-pick abc1234\ngit cherry-pick abc1234..def5678" },
  { cmd:"git remote", tag:"Remote", summary:"Manage remote connections", usecase:"Add, remove, rename, or list remote repositories.", example:"git remote -v\ngit remote add origin https://github.com/user/repo.git\ngit remote remove origin" },
  { cmd:"git fetch", tag:"Remote", summary:"Download remote changes without merging", usecase:"See what others have pushed without affecting your local branches.", example:"git fetch origin\ngit fetch --all\ngit fetch --prune" },
  { cmd:"git pull", tag:"Remote", summary:"Fetch and merge remote changes", usecase:"Sync your local branch with the latest changes from the remote.", example:"git pull\ngit pull origin main\ngit pull --rebase origin main" },
  { cmd:"git push", tag:"Remote", summary:"Upload local commits to remote", usecase:"Share your commits by pushing them to GitHub or another remote.", example:"git push origin main\ngit push -u origin feature/login\ngit push --force-with-lease" },
  { cmd:"git stash", tag:"Stash", summary:"Temporarily shelve uncommitted changes", usecase:"Save dirty work to switch branches quickly, then restore it later.", example:"git stash\ngit stash pop\ngit stash list\ngit stash apply stash@{2}\ngit stash drop" },
  { cmd:"git tag", tag:"Tags", summary:"Mark specific commits with a label", usecase:"Tag release versions like v1.0.0 so they're easy to find.", example:"git tag v1.0.0\ngit tag -a v1.0.0 -m \"Release 1.0\"\ngit push origin --tags\ngit tag -d v1.0.0" },
  { cmd:"git worktree", tag:"Advanced", summary:"Check out multiple branches at once", usecase:"Work on a hotfix in a separate directory while continuing feature work in another.", example:"git worktree add ../hotfix hotfix/crash\ngit worktree list\ngit worktree remove ../hotfix" },
  { cmd:"git bisect", tag:"Advanced", summary:"Binary search for a bad commit", usecase:"Quickly find which commit introduced a bug by halving the history on each step.", example:"git bisect start\ngit bisect bad\ngit bisect good v1.0.0\ngit bisect reset" },
  { cmd:"git submodule", tag:"Advanced", summary:"Manage nested repositories", usecase:"Include another Git repo as a dependency inside your project.", example:"git submodule add https://github.com/user/lib\ngit submodule update --init --recursive" },
  { cmd:"git reflog", tag:"Advanced", summary:"Show history of HEAD movements", usecase:"Recover lost commits or branches that were reset or deleted.", example:"git reflog\ngit checkout HEAD@{3}" },
  { cmd:"git clean", tag:"Advanced", summary:"Remove untracked files", usecase:"Wipe out generated or temp files not tracked by Git.", example:"git clean -n\ngit clean -fd\ngit clean -fdx" },
  { cmd:"git archive", tag:"Advanced", summary:"Export repo as a zip/tar", usecase:"Package a snapshot of the project without the .git folder.", example:"git archive --format=zip HEAD > release.zip\ngit archive HEAD | tar -x -C /tmp/export" },
];
const TAGS = ["All", ...Object.keys(TAG_COLORS)];
let activeTag = "All";
function buildFilters() {
  document.getElementById("filters").innerHTML = TAGS.map(t => {
    const isActive = t === activeTag;
    const color = TAG_COLORS[t];
    const style = isActive && color ? `background:${color.c};border-color:${color.c};color:#fff;` : '';
    return `<button class="filter-btn" style="${style}" onclick="setTag('${t}')">${t}</button>`;
  }).join("");
}
function setTag(t) { activeTag = t; render(); }
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  buildFilters();
  const filtered = COMMANDS.filter(c => {
    const matchTag = activeTag === "All" || c.tag === activeTag;
    const matchQ = !q || c.cmd.includes(q) || c.summary.toLowerCase().includes(q) || c.usecase.toLowerCase().includes(q) || c.tag.toLowerCase().includes(q);
    return matchTag && matchQ;
  });
  document.getElementById("count").textContent = `${filtered.length} command${filtered.length !== 1 ? 's' : ''}`;
  const list = document.getElementById("list");
  if (!filtered.length) { list.innerHTML = '<div class="no-results">No commands match your search.</div>'; return; }
  list.innerHTML = filtered.map((c, i) => {
    const tc = TAG_COLORS[c.tag] || { c: '#888', bg: 'rgba(136,136,136,0.1)' };
    return `<div class="cmd-card" id="card-${i}" onclick="toggle(${i})">
      <div class="cmd-top">
        <span class="cmd-code">${c.cmd}</span>
        <span class="cmd-summary">${c.summary}</span>
        <span class="cmd-tag" style="color:${tc.c};background:${tc.bg}">${c.tag}</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="cmd-detail">
        <div class="detail-section"><div class="detail-label">Use case</div><div class="use-case">${c.usecase}</div></div>
        <div class="detail-section"><div class="detail-label">Examples</div><div class="example-block">${c.example}</div></div>
      </div>
    </div>`;
  }).join("");
}
function toggle(i) { document.getElementById("card-"+i).classList.toggle("open"); }
render();
</script>
</body>
</html>
